  <style>
    /* Timeline styles */
    #timeline-container {
      position: relative;
      padding: 20px 0;
    }
    
    /* Vertical line */
    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #2c7da0, #0f3b5c);
      transform: translateX(-50%) scaleY(0);
      transform-origin: top;
      transition: transform 1.2s ease;
      border-radius: 3px;
    }
    
    .timeline-line.visible {
      transform: translateX(-50%) scaleY(1);
    }
    
    /* Timeline item */
    .timeline-item {
      opacity: 0;
      transition: all 0.6s ease;
      position: relative;
    }
    
    /* Left items */
    .timeline-item.left {
      transform: translateX(-50px);
    }
    
    /* Right items */
    .timeline-item.right {
      transform: translateX(50px);
    }
    
    /* Mobile items */
    @media (max-width: 767px) {
      .timeline-line {
        left: 20px;
      }
      
      .timeline-item.left,
      .timeline-item.right {
        transform: translateY(30px);
      }
    }
    
    /* Visible state */
    .timeline-item.visible {
      opacity: 1;
      transform: translate(0, 0) !important;
    }
    
    /* Dot styling */
    .timeline-dot {
      width: 16px;
      height: 16px;
      background: #2c7da0;
      border: 3px solid white;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 30px;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(44, 125, 160, 0.2);
      z-index: 10;
      transition: all 0.3s ease;
    }
    
    @media (max-width: 767px) {
      .timeline-dot {
        left: 20px;
      }
    }
    
    /* Dot pulse animation */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(44, 125, 160, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(44, 125, 160, 0); }
      100% { box-shadow: 0 0 0 0 rgba(44, 125, 160, 0); }
    }
    
    .timeline-dot.animate {
      animation: pulse 2s infinite;
    }
  </style>
</head>
